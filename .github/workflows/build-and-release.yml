- name: Extract version from csproj
        id: version
        shell: pwsh
        run: |
          $content = Get-Content "${{ env.PROJECT_PATH }}" -Raw
          
          # Try to find Version, InformationalVersion, or VersionPrefix using Regex
          if ($content -match '<(?:InformationalVersion|Version|VersionPrefix)>(.*?)<\/') {
              $v = $Matches[1].Trim()
          } else {
              Write-Host "⚠️ No version tag found in csproj. Defaulting to 1.0.0" -ForegroundColor Yellow
              $v = "1.0.0"
          }
          
          Write-Host "Final Version: $v" -ForegroundColor Green
          echo "APP_VERSION=$v" >> $env:GITHUB_OUTPUT
