name: Build and Release

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch:

env:
  PROJECT_PATH: CollimationCircles/CollimationCircles.csproj
  FRAMEWORK: net10.0
  APP_NAME: CollimationCircles
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            os: windows-latest
            index: 1
          - runtime: win-arm64
            os: windows-latest
            index: 2
          - runtime: linux-x64
            os: ubuntu-latest
            index: 3
          - runtime: linux-arm64
            os: ubuntu-latest
            index: 4
          - runtime: osx-x64
            os: macos-latest
            index: 5
          - runtime: osx-arm64
            os: macos-latest
            index: 6

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from csproj
        id: version
        shell: pwsh
        run: |
          [xml]$xml = Get-Content "${{ env.PROJECT_PATH }}"
          $v = ($xml.Project.PropertyGroup.InformationalVersion, $xml.Project.PropertyGroup.Version, $xml.Project.PropertyGroup.VersionPrefix | Where-Object { !([string]::IsNullOrWhiteSpace($_)) } | Select-Object -First 1)
          if (!$v) { $v = "1.0.0" }
          $v = $v.Trim()
          echo "APP_VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: |
          dotnet restore ${{ env.PROJECT_PATH }} -r ${{ matrix.runtime }} /p:PublishReadyToRun=true

      - name: Publish
        shell: pwsh
        run: |
          $publishArgs = @(
            "publish", "${{ env.PROJECT_PATH }}",
            "-c", "Release",
            "-r", "${{ matrix.runtime }}",
            "-o", "./publish/${{ matrix.runtime }}",
            "--self-contained", "true",
            "--no-restore",
            "/p:PublishSingleFile=true",
            "/p:PublishReadyToRun=true",
            "/p:PublishTrimmed=true",
            "/p:TrimMode=full",
            "/p:DebugType=None",
            "/p:DebugSymbols=false"
          )
          if ("${{ matrix.runtime }}".StartsWith("osx-")) {
            $publishArgs += "/p:UseAppHost=true"
          }
          dotnet @publishArgs

      - name: Package (Linux)
        if: startsWith(matrix.runtime, 'linux-')
        shell: bash
        run: |
          output="./publish/${{ matrix.runtime }}"
          chmod +x "${output}/${{ env.APP_NAME }}"
          tarName="./publish/${{ matrix.index }}-${{ env.APP_NAME }}-${{ steps.version.outputs.APP_VERSION }}-${{ matrix.runtime }}.tar.gz"
          tar -czf "${tarName}" -C "${output}" .

      - name: Package (Windows)
        if: startsWith(matrix.runtime, 'win-')
        shell: pwsh
        run: |
          $output = "./publish/${{ matrix.runtime }}"
          $zipName = "./publish/${{ matrix.index }}-${{ env.APP_NAME }}-${{ steps.version.outputs.APP_VERSION }}-${{ matrix.runtime }}.zip"
          Compress-Archive -Force "$output/*" $zipName

      - name: Package (macOS)
        if: startsWith(matrix.runtime, 'osx-')
        shell: bash
        run: |
          runtime="${{ matrix.runtime }}"
          bundle="${{ env.APP_NAME }}.app"
          contentPath="./publish/${runtime}_bundle/${bundle}/Contents"
          mkdir -p "${contentPath}/MacOS"
          mkdir -p "${contentPath}/Resources"

          # Write Info.plist line-by-line to avoid ${{ parse errors in YAML
          echo '<?xml version="1.0" encoding="utf-8"?>' > "${contentPath}/Info.plist"
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> "${contentPath}/Info.plist"
          echo '<plist version="1.0">' >> "${contentPath}/Info.plist"
          echo '<dict>' >> "${contentPath}/Info.plist"
          echo "  <key>CFBundleIconFile</key><string>icon.icns</string>" >> "${contentPath}/Info.plist"
          echo "  <key>CFBundleIdentifier</key><string>com.saimons.${{ env.APP_NAME }}</string>" >> "${contentPath}/Info.plist"
          echo "  <key>CFBundleName</key><string>${{ env.APP_NAME }}</string>" >> "${contentPath}/Info.plist"
          echo "  <key>CFBundleVersion</key><string>${{ steps.version.outputs.APP_VERSION }}</string>" >> "${contentPath}/Info.plist"
          echo "  <key>CFBundleExecutable</key><string>${{ env.APP_NAME }}</string>" >> "${contentPath}/Info.plist"
          echo "  <key>CFBundlePackageType</key><string>APPL</string>" >> "${contentPath}/Info.plist"
          echo "  <key>LSMinimumSystemVersion</key><string>11.0</string>" >> "${contentPath}/Info.plist"
          echo '</dict>' >> "${contentPath}/Info.plist"
          echo '</plist>' >> "${contentPath}/Info.plist"

          cp -R "./publish/${runtime}/"* "${contentPath}/MacOS/"
          [ -f "${contentPath}/MacOS/icon.icns" ] && mv "${contentPath}/MacOS/icon.icns" "${contentPath}/Resources/"
          chmod +x "${contentPath}/MacOS/${{ env.APP_NAME }}"
          
          tarName="./publish/${{ matrix.index }}-${{ env.APP_NAME }}-${{ steps.version.outputs.APP_VERSION }}-${runtime}.tar.gz"
          tar -czf "${tarName}" -C "./publish/${runtime}_bundle" "${bundle}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.runtime }}
          path: |
            ./publish/*.zip
            ./publish/*.tar.gz
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./artifacts/*.zip
            ./artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
